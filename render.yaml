# Optional: Blueprint for Render.com one-click deploy
# Dashboard → New → Blueprint → connect repo with this file

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory_db
    user: inventory_user

services:
  - type: web
    name: inventory-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGIN
        sync: false

  - type: web
    name: inventory-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        sync: false
